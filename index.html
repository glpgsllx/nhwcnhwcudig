<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>你画我猜 Demo</title>
    <link rel="stylesheet" href="./styles.css?v=20260616-fill" />
  </head>
  <body>
    <main class="app">
      <section id="lobby" class="lobby">
        <div class="intro">
          <p class="eyebrow">Draw & Guess</p>
          <h1>你画我猜</h1>
          <p>创建一个房间，把房间码发给对方。支持浏览器点对点联机；如果网络库加载失败，会自动退回本机双窗口试玩。</p>
        </div>

        <form id="joinForm" class="join-form">
          <label>
            昵称
            <input id="nameInput" maxlength="12" placeholder="比如 小陈" required />
          </label>
          <label>
            房间码
            <input id="roomInput" maxlength="16" placeholder="留空自动创建" />
          </label>
          <button type="submit">进入房间</button>
        </form>
      </section>

      <section id="game" class="game hidden">
        <header class="topbar">
          <div>
            <p class="eyebrow">房间 <button id="copyRoom" class="text-button" type="button" title="复制邀请链接"></button></p>
            <h2 id="roundTitle">准备开始</h2>
            <p id="syncStatus" class="sync-status">同步：未连接</p>
          </div>
          <div class="scoreboard">
            <span id="timer">60s</span>
            <span id="score">0 : 0</span>
          </div>
        </header>

        <section class="play-area">
          <aside class="side-panel">
            <div class="word-box">
              <p>当前身份</p>
              <strong id="roleLabel">-</strong>
              <span id="wordLabel">等待开始</span>
            </div>

            <div class="players">
              <h3>玩家</h3>
              <ul id="playerList"></ul>
            </div>

            <div class="controls">
              <button id="startRound" type="button">开始/换题</button>
              <button id="swapRole" type="button">交换画手</button>
              <button id="clearCanvas" type="button">清空画板</button>
            </div>
          </aside>

          <section class="board-wrap">
            <div class="toolbar" aria-label="画笔工具">
              <div class="tool-group">
                <button id="undoStroke" class="tool-button" type="button" title="撤销">撤销</button>
                <button id="redoStroke" class="tool-button" type="button" title="重做">重做</button>
                <button id="toolbarClearCanvas" class="tool-button danger" type="button" title="清空双方画板">清屏</button>
              </div>
              <div class="tool-group" aria-label="笔刷类型">
                <button class="tool-button active" type="button" data-tool="marker">马克笔</button>
                <button class="tool-button" type="button" data-tool="pencil">铅笔</button>
                <button class="tool-button" type="button" data-tool="highlighter">荧光笔</button>
                <button class="tool-button" type="button" data-tool="crayon">蜡笔</button>
                <button class="tool-button" type="button" data-tool="fill">填色</button>
                <button class="tool-button" type="button" data-tool="eyedropper">吸管</button>
                <button id="eraser" class="tool-button" type="button" data-tool="eraser">橡皮</button>
              </div>
              <div class="swatches" aria-label="颜色">
                <button class="swatch active" type="button" data-color="#111827" style="--swatch: #111827" title="黑色"></button>
                <button class="swatch" type="button" data-color="#ef4444" style="--swatch: #ef4444" title="红色"></button>
                <button class="swatch" type="button" data-color="#2563eb" style="--swatch: #2563eb" title="蓝色"></button>
                <button class="swatch" type="button" data-color="#16a34a" style="--swatch: #16a34a" title="绿色"></button>
                <button class="swatch" type="button" data-color="#facc15" style="--swatch: #facc15" title="黄色"></button>
                <button class="swatch" type="button" data-color="#ec4899" style="--swatch: #ec4899" title="粉色"></button>
                <button class="swatch" type="button" data-color="#8b5cf6" style="--swatch: #8b5cf6" title="紫色"></button>
                <input id="colorPicker" type="color" value="#111827" title="自定义颜色" />
              </div>
              <div class="tool-group" aria-label="笔粗">
                <button class="tool-button" type="button" data-size="3">细</button>
                <button class="tool-button active" type="button" data-size="7">中</button>
                <button class="tool-button" type="button" data-size="13">粗</button>
                <button class="tool-button" type="button" data-size="22">超粗</button>
              </div>
              <div class="tool-group" aria-label="橡皮大小">
                <button class="tool-button" type="button" data-eraser-size="12" title="小号橡皮">橡皮小</button>
                <button class="tool-button active" type="button" data-eraser-size="26" title="中号橡皮">橡皮中</button>
                <button class="tool-button" type="button" data-eraser-size="44" title="大号橡皮">橡皮大</button>
              </div>
              <label class="opacity-control">
                透明度
                <input id="opacityRange" type="range" min="15" max="100" value="100" />
                <span id="opacityLabel">100%</span>
              </label>
              <div class="zoom-status" aria-label="缩放比例">
                缩放 <span id="zoomLabel">100%</span>
              </div>
            </div>
            <div id="canvasViewport" class="canvas-viewport">
              <canvas id="board" width="960" height="640"></canvas>
            </div>
          </section>

          <aside class="chat-panel">
            <div id="messages" class="messages"></div>
            <form id="guessForm" class="guess-form">
              <input id="guessInput" placeholder="输入答案或聊天" autocomplete="off" />
              <button type="submit">发送</button>
            </form>
          </aside>
        </section>
      </section>
    </main>

    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script src="./word-bank.js?v=20260616"></script>
    <script src="./app.js?v=20260616-fill"></script>
  </body>
</html>
