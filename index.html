<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>你画我猜 Demo</title>
    <link rel="stylesheet" href="./styles.css?v=20260616-icons" />
  </head>
  <body>
    <main class="app">
      <section id="lobby" class="lobby">
        <div class="intro">
          <p class="eyebrow">Draw & Guess</p>
          <h1>你画我猜</h1>
          <p>创建一个房间，把房间码发给对方。支持浏览器点对点联机；如果网络库加载失败，会自动退回本机双窗口试玩。</p>
        </div>

        <form id="joinForm" class="join-form">
          <label>
            昵称
            <input id="nameInput" maxlength="12" placeholder="比如 小陈" required />
          </label>
          <label>
            房间码
            <input id="roomInput" maxlength="16" placeholder="留空自动创建" />
          </label>
          <button type="submit">进入房间</button>
        </form>
      </section>

      <section id="game" class="game hidden">
        <header class="topbar">
          <div>
            <p class="eyebrow">房间 <button id="copyRoom" class="text-button" type="button" title="复制邀请链接"></button></p>
            <h2 id="roundTitle">准备开始</h2>
            <p id="syncStatus" class="sync-status">同步：未连接</p>
          </div>
          <div class="scoreboard">
            <span id="timer">60s</span>
            <span id="score">0 : 0</span>
          </div>
        </header>

        <section class="play-area">
          <aside class="side-panel">
            <div class="word-box">
              <p>当前身份</p>
              <strong id="roleLabel">-</strong>
              <span id="wordLabel">等待开始</span>
            </div>

            <div class="players">
              <h3>玩家</h3>
              <ul id="playerList"></ul>
            </div>

            <div class="controls">
              <button id="startRound" type="button">开始/换题</button>
              <button id="swapRole" type="button">交换画手</button>
              <button id="clearCanvas" type="button">清空画板</button>
            </div>
          </aside>

          <section class="board-wrap">
            <div class="toolbar" aria-label="画笔工具">
              <div class="tool-group">
                <button id="undoStroke" class="tool-button icon-button" type="button" title="撤销" aria-label="撤销">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 7 5 11l4 4"/><path d="M5 11h10a4 4 0 0 1 0 8h-3"/></svg>
                </button>
                <button id="redoStroke" class="tool-button icon-button" type="button" title="重做" aria-label="重做">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 7 4 4-4 4"/><path d="M19 11H9a4 4 0 0 0 0 8h3"/></svg>
                </button>
                <button id="toolbarClearCanvas" class="tool-button icon-button danger" type="button" title="清空双方画板" aria-label="清屏">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M6 7l1 14h10l1-14"/><path d="M9 7V4h6v3"/></svg>
                </button>
              </div>
              <div class="tool-group" aria-label="笔刷类型">
                <button class="tool-button icon-button active" type="button" data-tool="marker" title="马克笔" aria-label="马克笔">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 20 3-1 10-10-2-2L5 17l-1 3Z"/><path d="m14 6 2-2 4 4-2 2"/><path d="M7 19h13"/></svg>
                </button>
                <button class="tool-button icon-button" type="button" data-tool="pencil" title="铅笔" aria-label="铅笔">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 20 4-1 11-11-3-3L5 16l-1 4Z"/><path d="m14 7 3 3"/></svg>
                </button>
                <button class="tool-button icon-button" type="button" data-tool="highlighter" title="荧光笔" aria-label="荧光笔">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 16 7-7 3 3-7 7H5v-3Z"/><path d="m13 8 2-2 3 3-2 2"/><path d="M4 21h16"/></svg>
                </button>
                <button class="tool-button icon-button" type="button" data-tool="crayon" title="蜡笔" aria-label="蜡笔">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 20 4 17 15 6l3 3L7 20Z"/><path d="m14 7 3 3"/><path d="m17 4 3 3-2 2-3-3 2-2Z"/><path d="M5 18l2 2"/></svg>
                </button>
                <button class="tool-button icon-button" type="button" data-tool="fill" title="填色" aria-label="填色">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 13 7-7 8 8-7 7-8-8Z"/><path d="m8 6 8 8"/><path d="M19 15c2 2 2 4 0 4s-2-2 0-4Z"/></svg>
                </button>
                <button class="tool-button icon-button" type="button" data-tool="eyedropper" title="吸管" aria-label="吸管">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m14 5 5 5"/><path d="m12 7 5 5-9 9H4v-4l8-10Z"/><path d="m13 6 2-2a2 2 0 0 1 3 3l-2 2"/></svg>
                </button>
                <button id="eraser" class="tool-button icon-button" type="button" data-tool="eraser" title="橡皮" aria-label="橡皮">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 15 8-8 7 7-5 5H8l-4-4Z"/><path d="m9 10 6 6"/><path d="M13 19h7"/></svg>
                </button>
              </div>
              <div class="swatches" aria-label="颜色">
                <button class="swatch active" type="button" data-color="#111827" style="--swatch: #111827" title="黑色"></button>
                <button class="swatch" type="button" data-color="#ef4444" style="--swatch: #ef4444" title="红色"></button>
                <button class="swatch" type="button" data-color="#2563eb" style="--swatch: #2563eb" title="蓝色"></button>
                <button class="swatch" type="button" data-color="#16a34a" style="--swatch: #16a34a" title="绿色"></button>
                <button class="swatch" type="button" data-color="#facc15" style="--swatch: #facc15" title="黄色"></button>
                <button class="swatch" type="button" data-color="#ec4899" style="--swatch: #ec4899" title="粉色"></button>
                <button class="swatch" type="button" data-color="#8b5cf6" style="--swatch: #8b5cf6" title="紫色"></button>
                <input id="colorPicker" type="color" value="#111827" title="自定义颜色" />
              </div>
              <div class="tool-group" aria-label="笔粗">
                <button class="tool-button" type="button" data-size="3">细</button>
                <button class="tool-button active" type="button" data-size="7">中</button>
                <button class="tool-button" type="button" data-size="13">粗</button>
                <button class="tool-button" type="button" data-size="22">超粗</button>
              </div>
              <div class="tool-group" aria-label="橡皮大小">
                <button class="tool-button" type="button" data-eraser-size="12" title="小号橡皮">橡皮小</button>
                <button class="tool-button active" type="button" data-eraser-size="26" title="中号橡皮">橡皮中</button>
                <button class="tool-button" type="button" data-eraser-size="44" title="大号橡皮">橡皮大</button>
              </div>
              <label class="opacity-control">
                透明度
                <input id="opacityRange" type="range" min="15" max="100" value="100" />
                <span id="opacityLabel">100%</span>
              </label>
              <div class="zoom-status" aria-label="缩放比例">
                缩放 <span id="zoomLabel">100%</span>
              </div>
            </div>
            <div id="canvasViewport" class="canvas-viewport">
              <canvas id="board" width="960" height="640"></canvas>
            </div>
          </section>

          <aside class="chat-panel">
            <div id="messages" class="messages"></div>
            <form id="guessForm" class="guess-form">
              <input id="guessInput" placeholder="输入答案或聊天" autocomplete="off" />
              <button type="submit">发送</button>
            </form>
          </aside>
        </section>
      </section>
    </main>

    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script src="./word-bank.js?v=20260616"></script>
    <script src="./app.js?v=20260616-icons"></script>
  </body>
</html>
